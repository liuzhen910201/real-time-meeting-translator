audio:
  device_id: 0
  sample_rate: 48000
  chunk_seconds: 2.0

transcription:
  mode: gpt
  gpt_model: gpt-4o-mini-transcribe
  whisper_model: small
  whisper_device: cpu
  whisper_compute_type: int8

translation:
  provider: deepseek
  model: deepseek-chat
  target_language: Chinese
  buffer_lines: 2
  check_interval: 0.1

tts:
  enabled: true
  voice: zh-CN-XiaoxiaoNeural
  rate: "+0%"
  volume: "+0%"
  check_interval: 0.2

files:
  captions_file: captions_from_audio.txt
  translated_log: translated.log
  latest_translation: latest_translation.txt
  temp_wav: chunk.wav
  tts_mp3: tts_latest.mp3
